version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: ai_widget_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: widget_admin
      POSTGRES_PASSWORD: X7m4p9qZsR
      POSTGRES_DB: widget_platform
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U widget_admin -d widget_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
