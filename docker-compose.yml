services:
  app:
    build: .
    container_name: ai_project_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MESSAGE_DATABASE_URL: ${MESSAGE_DATABASE_URL:-/app/data/dialogs.sqlite3}
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - db
    dns:
      - 1.1.1.1
      - 8.8.8.8

  db:
    image: postgres:15-alpine
    container_name: ai_project_db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
