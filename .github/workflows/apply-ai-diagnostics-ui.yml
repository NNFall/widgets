name: Apply AI diagnostics and UI patch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Download and verify patch
        run: |
          set -euo pipefail
          curl -fsSL --retry 3 "https://kaigo.online/assets/codex-patches/ai-diagnostics-ui.patch" -o /tmp/ai-diagnostics-ui.patch
          echo "9606f983e8bc62dad4647ac6949fcc6c3bcf34e9ba5b2fc96e0115541c021fb5  /tmp/ai-diagnostics-ui.patch" | sha256sum -c -

      - name: Apply patch and verify Python syntax
        run: |
          set -euo pipefail
          git apply /tmp/ai-diagnostics-ui.patch
          rm -f .github/workflows/apply-ai-diagnostics-ui.yml
          python -m py_compile app/admin/auth.py app/admin/layout.py app/api/routes.py app/client/routes.py app/widgets/routes.py core/ai_service.py core/api.py core/config.py wrappers/web_app_aiohttp.py

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git status --short
          git commit -m "Improve AI diagnostics and widget UI"
          git push
