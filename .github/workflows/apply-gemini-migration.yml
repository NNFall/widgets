name: Apply Gemini migration

on:
  push:
    paths:
      - .github/workflows/apply-gemini-migration.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download patch
        run: |
          curl -fsSL "https://kaigo.online/assets/codex-patches/gemini-migration.patch" -o /tmp/gemini-migration.patch
          echo "52b27c7a837cd6311cfd9860c5d6dbc9522ff3549fccaae4f74a944ef8d91ea5  /tmp/gemini-migration.patch" | sha256sum -c -

      - name: Apply patch
        run: |
          git apply --check /tmp/gemini-migration.patch
          git apply /tmp/gemini-migration.patch
          rm -f .github/workflows/apply-gemini-migration.yml

      - name: Validate Python syntax
        run: |
          python -m py_compile \
            app/admin/routes.py \
            app/widgets/routes.py \
            core/ai_service.py \
            core/api.py \
            core/config.py \
            main.py \
            scripts/reset_assets.py \
            scripts/seed_demo.py \
            scripts/seed_full_widget.py \
            wrappers/admin_bot.py \
            wrappers/web_app.py \
            wrappers/web_app_aiohttp.py \
            wrappers/web_app_simple.py

      - name: Commit changes
        run: |
          git config user.name "codex-app"
          git config user.email "codex-app@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Switch AI provider to Gemini"
          git push
