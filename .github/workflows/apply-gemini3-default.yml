name: Apply Gemini 3 Flash defaults

on:
  push:
    paths:
      - .github/workflows/apply-gemini3-default.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download patch
        run: |
          curl -fsSL "https://kaigo.online/assets/codex-patches/gemini3-default.patch" -o /tmp/gemini3-default.patch
          echo "cdd093d94b1bb0d287292f8bf52316605da35ebf812e77aa2e18716a304e4542  /tmp/gemini3-default.patch" | sha256sum -c -

      - name: Apply patch
        run: |
          git apply --check /tmp/gemini3-default.patch
          git apply /tmp/gemini3-default.patch
          rm -f .github/workflows/apply-gemini3-default.yml

      - name: Validate Python syntax
        run: |
          python -m py_compile \
            app/admin/routes.py \
            app/widgets/routes.py \
            core/ai_service.py \
            core/config.py \
            scripts/reset_assets.py \
            scripts/seed_demo.py \
            scripts/seed_full_widget.py \
            wrappers/admin_bot.py \
            wrappers/web_app_aiohttp.py

      - name: Commit changes
        run: |
          git config user.name "codex-app"
          git config user.email "codex-app@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Default to Gemini 3 Flash"
          git push
