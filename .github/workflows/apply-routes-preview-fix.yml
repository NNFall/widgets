name: Apply routes preview URL fix

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Patch routes preview URLs
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          p = Path('app/admin/routes.py')
          text = p.read_text(encoding='utf-8-sig')
          helper = """def _adjust_preview_urls(html: str, widget_slug: str) -> str:\n    for endpoint in ('send', 'history', 'audio'):\n        path = f'/api/{endpoint}'\n        full_path = f'/w/{widget_slug}{path}'\n        token = f'__KAIGO_PREVIEW_{endpoint.upper()}__'\n        html = html.replace(full_path, token)\n        html = html.replace(path, full_path)\n        html = html.replace(token, full_path)\n    return html\n\n"""
          if '_adjust_preview_urls' not in text:
              pattern = r"(def _default_widget_assets\(template_key: str\) -> Tuple\[str, str \| None, str \| None\]:\n+    return get_template_html\(template_key\), None, None\n+)"
              text, count = re.subn(pattern, lambda m: m.group(1) + helper, text, count=1)
              if count != 1:
                  raise SystemExit('anchor not found')
          text = text.replace(
              "body = html_code or '<p>No HTML provided</p>'",
              "body = _adjust_preview_urls(html_code, widget.slug) if html_code else '<p>No HTML provided</p>'",
          )
          text = text.replace(
              "body = asset.html or '<p>HTML не задан</p>'",
              "body = _adjust_preview_urls(asset.html, widget.slug) if asset.html else '<p>HTML не задан</p>'",
          )
          while '\n\n\n' in text:
              text = text.replace('\n\n\n', '\n\n')
          p.write_text(text, encoding='utf-8')
          PY
          rm -f .github/workflows/apply-routes-preview-fix.yml
          python -m py_compile app/admin/routes.py
          test "$(git hash-object app/admin/routes.py)" = "378168a65d1a262f20e168820ffdccf3aff93ce7"

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/admin/routes.py .github/workflows/apply-routes-preview-fix.yml
          git status --short
          git commit -m "Fix admin asset preview URLs"
          git push
