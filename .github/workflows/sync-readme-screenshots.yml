name: Sync README screenshots

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Download screenshots
        run: |
          set -euo pipefail
          base="https://kaigo.online/assets/codex-screenshots-ae8178d"
          curl -fsSL --retry 3 "$base/admin-login.jpg" -o docs/screenshots/admin-login.jpg
          curl -fsSL --retry 3 "$base/client-login.jpg" -o docs/screenshots/client-login.jpg
          curl -fsSL --retry 3 "$base/site-root.jpg" -o docs/screenshots/site-root.jpg
          curl -fsSL --retry 3 "$base/widget-demka.jpg" -o docs/screenshots/widget-demka.jpg
          test "$(git hash-object docs/screenshots/admin-login.jpg)" = "a029368835c2cc1058f833c9e7df52e12eb39024"
          test "$(git hash-object docs/screenshots/client-login.jpg)" = "764d6dc0d143578171b82e134408eb3f8846b75d"
          test "$(git hash-object docs/screenshots/site-root.jpg)" = "a2d1f41409b15f8c4fbed1aaccc53fb5a8fc4597"
          test "$(git hash-object docs/screenshots/widget-demka.jpg)" = "d326ba16c194474f72886394f34c9f6a2890af97"
          rm -f .github/workflows/sync-readme-screenshots.yml

      - name: Commit screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots/*.jpg .github/workflows/sync-readme-screenshots.yml
          git status --short
          git commit -m "Sync README screenshots"
          git push
