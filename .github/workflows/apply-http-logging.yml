name: Apply HTTP logging patch

on:
  push:
    paths:
      - .github/workflows/apply-http-logging.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download patch
        run: |
          curl -fsSL "https://kaigo.online/assets/codex-patches/http-logging.patch" -o /tmp/http-logging.patch
          echo "79e80404b3ce497a60f3b9b325146ef55cf0ce1d37d88ecd4eaffee7771e1b59  /tmp/http-logging.patch" | sha256sum -c -

      - name: Apply patch
        run: |
          git apply --check /tmp/http-logging.patch
          git apply /tmp/http-logging.patch
          rm -f .github/workflows/apply-http-logging.yml

      - name: Validate Python syntax
        run: |
          python -m py_compile app/logging_config.py main.py

      - name: Commit changes
        run: |
          git config user.name "codex-app"
          git config user.email "codex-app@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Reduce noisy HTTP client logging"
          git push
